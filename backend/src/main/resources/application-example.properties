spring.application.name=backend
# Database Connection URL
spring.datasource.url=jdbc:postgresql://localhost:5432/grievance_db
# Database Credentials
spring.datasource.username=your-username
spring.datasource.password=your-password
# Keep the connection alive and log SQL queries for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# CRITICAL: This tells Hibernate to auto-create or update tables based on your Java code
spring.jpa.hibernate.ddl-auto=update
# Dialect (Tells Spring exactly which flavor of SQL to speak)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect